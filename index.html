<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#D5495B">
<title>50音字卡</title>
</head>
<body>
<style>
  :root{
    --bg:#F6F3EC; --card:#FFFFFF; --ink:#35333D; --sub:#8B8794;
    --accent:#D5495B; --accent-soft:#FBEAEC;
    --indigo:#44568F; --indigo-soft:#EAEEF8;
    --good:#3F9668; --mid:#D9A036; --weak:#D5495B; --new:#C9C5BC;
    --line:#E7E2D7; --shadow:0 2px 10px rgba(60,50,40,.08);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1A1B21; --card:#25262E; --ink:#ECEAF2; --sub:#9B98A8;
      --accent:#F07E8E; --accent-soft:#3A2A2E;
      --indigo:#93A6DB; --indigo-soft:#2A2E3D;
      --good:#5FBF8A; --mid:#E0B25C; --weak:#F07E8E; --new:#4A4B55;
      --line:#35363F; --shadow:0 2px 10px rgba(0,0,0,.35);
    }
  }
  :root[data-theme="light"]{
    --bg:#F6F3EC; --card:#FFFFFF; --ink:#35333D; --sub:#8B8794;
    --accent:#D5495B; --accent-soft:#FBEAEC;
    --indigo:#44568F; --indigo-soft:#EAEEF8;
    --good:#3F9668; --mid:#D9A036; --weak:#D5495B; --new:#C9C5BC;
    --line:#E7E2D7; --shadow:0 2px 10px rgba(60,50,40,.08);
  }
  :root[data-theme="dark"]{
    --bg:#1A1B21; --card:#25262E; --ink:#ECEAF2; --sub:#9B98A8;
    --accent:#F07E8E; --accent-soft:#3A2A2E;
    --indigo:#93A6DB; --indigo-soft:#2A2E3D;
    --good:#5FBF8A; --mid:#E0B25C; --weak:#F07E8E; --new:#4A4B55;
    --line:#35363F; --shadow:0 2px 10px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Noto Sans TC","Microsoft JhengHei","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    font-size:16px; line-height:1.5;
  }
  .kana-font{font-family:"Noto Serif JP","Hiragino Mincho ProN","Yu Mincho","Noto Serif TC",serif}
  #app{max-width:480px; margin:0 auto; padding:14px 14px 84px}
  header.top{display:flex; align-items:baseline; gap:10px; padding:6px 2px 14px}
  header.top h1{font-size:20px; margin:0; letter-spacing:.05em}
  header.top .sub{color:var(--sub); font-size:13px}
  .hidden{display:none !important}
  button{font-family:inherit; cursor:pointer}
  button:focus-visible{outline:3px solid var(--indigo); outline-offset:2px}

  /* ---- 50音 grid ---- */
  .kana-grid{display:grid; grid-template-columns:repeat(5,1fr); gap:8px}
  .kana-cell{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:10px 0 8px; text-align:center; box-shadow:var(--shadow); border-bottom-width:3px;
  }
  .kana-cell .k{font-size:26px; line-height:1.15}
  .kana-cell .r{font-size:11px; color:var(--sub); letter-spacing:.06em}
  .kana-cell.m-good{border-bottom-color:var(--good)}
  .kana-cell.m-mid{border-bottom-color:var(--mid)}
  .kana-cell.m-weak{border-bottom-color:var(--weak)}
  .kana-cell.m-new{border-bottom-color:var(--new)}
  .kana-cell:active{transform:scale(.95)}
  .grid-gap{visibility:hidden}

  /* ---- card overlay ---- */
  #cardOverlay{
    position:fixed; inset:0; background:var(--bg); z-index:50;
    overflow-y:auto; padding:12px 16px 20px;
  }
  #cardOverlay .inner{max-width:480px; margin:0 auto}
  .card-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px}
  .card-top .pos{color:var(--sub); font-size:14px; font-variant-numeric:tabular-nums}
  .icon-btn{
    background:var(--card); border:1px solid var(--line); border-radius:10px;
    padding:8px 14px; font-size:15px; color:var(--ink); box-shadow:var(--shadow);
  }
  .flashcard{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    box-shadow:var(--shadow); padding:22px 18px; text-align:center;
  }
  .flashcard .big-kana{font-size:96px; line-height:1.1; color:var(--accent)}
  .flashcard .romaji{font-size:20px; color:var(--sub); letter-spacing:.15em; margin-top:2px}
  .src-chip{
    display:inline-block; margin-top:10px; padding:3px 12px; border-radius:999px;
    background:var(--indigo-soft); color:var(--indigo); font-size:14px;
  }
  .word-block{margin-top:16px; padding-top:16px; border-top:1px dashed var(--line)}
  .word-block .emoji{font-size:56px; line-height:1.2}
  .word-block .word{font-size:32px; margin-top:6px}
  .word-block .word .hl{color:var(--accent); font-weight:700}
  .word-block .mean{color:var(--sub); font-size:15px; margin-top:2px}
  .tip-box{
    margin-top:14px; background:var(--accent-soft); border-radius:12px;
    padding:10px 14px; font-size:15px; text-align:left; color:var(--ink);
  }
  .tip-box b{color:var(--accent)}
  .sub-words{display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; justify-content:center}
  .sub-chip{
    background:var(--indigo-soft); border:1px solid var(--line); border-radius:999px;
    padding:7px 14px; font-size:16px; color:var(--ink);
  }
  .sub-chip .hl{color:var(--accent); font-weight:700}
  .sub-chip .m{color:var(--sub); font-size:13px; margin-left:4px}
  .speak-row{display:flex; gap:10px; margin-top:16px}
  .speak-btn{
    flex:1; border:none; border-radius:12px; padding:13px 0; font-size:16px;
    background:var(--accent); color:#fff;
  }
  .speak-btn.alt{background:var(--indigo)}
  .speak-btn:active{opacity:.85}
  .nav-row{display:flex; gap:10px; margin-top:12px}
  .nav-btn{
    flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 0; font-size:16px; color:var(--ink); box-shadow:var(--shadow);
  }

  /* ---- quiz ---- */
  .range-box{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:12px 14px; box-shadow:var(--shadow);
  }
  .range-box .rt{font-size:14px; font-weight:700; margin-bottom:8px}
  .range-box .rt .cnt{color:var(--sub); font-weight:400; margin-left:6px; font-size:13px}
  .range-chips{display:flex; flex-wrap:wrap; gap:7px}
  .range-chip{
    border:1.5px solid var(--line); background:none; color:var(--sub);
    border-radius:999px; padding:6px 13px; font-size:14px;
  }
  .range-chip.on{border-color:var(--accent); background:var(--accent-soft); color:var(--accent); font-weight:700}
  .mode-list{display:flex; flex-direction:column; gap:10px}
  .mode-btn{
    display:flex; align-items:center; gap:12px; text-align:left;
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    padding:14px 16px; box-shadow:var(--shadow); color:var(--ink);
  }
  .mode-btn .ic{font-size:26px}
  .mode-btn .t{font-size:17px; font-weight:700}
  .mode-btn .d{font-size:13px; color:var(--sub)}
  .mode-btn:active{transform:scale(.98)}
  .quiz-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px}
  .quiz-head .n{color:var(--sub); font-variant-numeric:tabular-nums}
  .q-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    box-shadow:var(--shadow); padding:22px 16px; text-align:center; margin-bottom:12px;
  }
  .q-card .q-kana{font-size:76px; line-height:1.1}
  .q-card .q-emoji{font-size:60px}
  .q-card .q-word{font-size:30px; margin-top:4px}
  .q-card .q-word .blank{color:var(--accent); font-weight:700}
  .q-card .q-mean{color:var(--sub); font-size:15px}
  .q-card .q-label{color:var(--sub); font-size:14px; margin-bottom:6px}
  .play-big{
    border:none; background:var(--indigo); color:#fff; border-radius:999px;
    font-size:22px; padding:14px 34px;
  }
  .ans-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px}
  .ans-btn{
    background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:16px 0; font-size:26px; color:var(--ink); box-shadow:var(--shadow);
  }
  .ans-btn.romaji-ans{font-size:22px; letter-spacing:.08em}
  .ans-btn.correct{border-color:var(--good); background:var(--good); color:#fff}
  .ans-btn.wrong{border-color:var(--weak); background:var(--weak); color:#fff}
  .ans-btn.dim{opacity:.45}
  .feedback{min-height:30px; text-align:center; margin-top:12px; font-size:17px; font-weight:700}
  .feedback.ok{color:var(--good)}
  .feedback.no{color:var(--weak)}
  .next-btn{
    display:block; width:100%; margin-top:10px; border:none; border-radius:12px;
    padding:14px 0; font-size:17px; background:var(--accent); color:#fff;
  }
  .result-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    box-shadow:var(--shadow); padding:24px 18px; text-align:center;
  }
  .result-card .score{font-size:44px; font-weight:700; font-variant-numeric:tabular-nums}
  .result-card .wrong-list{margin-top:10px; font-size:26px; letter-spacing:.2em; color:var(--weak)}

  /* ---- game ---- */
  .game-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:12px}
  .g-card{
    position:relative; aspect-ratio:3/3.4; border-radius:12px; border:none;
    background:var(--indigo); color:#fff; font-size:24px;
    display:flex; align-items:center; justify-content:center;
    transition:transform .15s;
  }
  .g-card::after{content:"？"; font-size:22px; opacity:.7}
  .g-card.open,.g-card.matched{background:var(--card); color:var(--ink); border:2px solid var(--indigo)}
  .g-card.open::after,.g-card.matched::after{content:none}
  .g-card.matched{border-color:var(--good); color:var(--good)}
  .g-card:active{transform:scale(.94)}
  .game-info{display:flex; justify-content:space-between; align-items:center; color:var(--sub); font-size:15px}
  .game-done{text-align:center; font-size:18px; font-weight:700; color:var(--good); margin-top:14px}

  /* ---- progress ---- */
  .legend{display:flex; gap:14px; flex-wrap:wrap; margin:6px 0 12px; font-size:13px; color:var(--sub)}
  .legend .dot{display:inline-block; width:10px; height:10px; border-radius:99px; margin-right:4px}
  .stat-row{display:flex; gap:10px; margin-bottom:14px}
  .stat-box{
    flex:1; background:var(--card); border:1px solid var(--line); border-radius:12px;
    text-align:center; padding:10px 0; box-shadow:var(--shadow);
  }
  .stat-box .v{font-size:24px; font-weight:700; font-variant-numeric:tabular-nums}
  .stat-box .l{font-size:12px; color:var(--sub)}
  .danger-btn{
    display:block; width:100%; margin-top:16px; background:none; color:var(--weak);
    border:1px solid var(--weak); border-radius:12px; padding:11px 0; font-size:15px;
  }

  /* ---- bottom nav ---- */
  nav.tabbar{
    position:fixed; bottom:0; left:0; right:0; z-index:40;
    background:var(--card); border-top:1px solid var(--line);
    display:flex; justify-content:center;
  }
  nav.tabbar .wrap{display:flex; width:100%; max-width:480px}
  .tab-btn{
    flex:1; background:none; border:none; padding:9px 0 12px; color:var(--sub);
    font-size:12px; display:flex; flex-direction:column; align-items:center; gap:1px;
  }
  .tab-btn .ic{font-size:21px}
  .tab-btn.active{color:var(--accent); font-weight:700}
  .section-note{color:var(--sub); font-size:13px; margin:2px 2px 12px}
  @media (prefers-reduced-motion: reduce){
    *{transition:none !important; animation:none !important}
  }
</style>

<div id="app">
  <header class="top">
    <h1>50音字卡</h1>
    <span class="sub" id="topSub">平假名・清音 46 字</span>
  </header>

  <!-- 字卡 -->
  <section id="view-cards">
    <p class="section-note">點任一個假名打開字卡。格子下緣的顏色是熟練度（綠＝熟、黃＝學習中、紅＝不熟）。</p>
    <div class="kana-grid" id="cardsGrid"></div>
  </section>

  <!-- 測驗 -->
  <section id="view-quiz" class="hidden">
    <div id="quizMenu" class="mode-list">
      <p class="section-note">先選測驗範圍（建議一次 1～2 行、5～10 個音），小範圍熟了再挑戰全部。每回合 10 題，答錯會自動記錄。</p>
      <div class="range-box">
        <div class="rt">測驗範圍<span class="cnt" id="rangeCount"></span></div>
        <div class="range-chips" id="rangeChips"></div>
      </div>
      <button class="mode-btn" data-mode="read"><span class="ic">👀</span><span><span class="t">看字選音</span><br><span class="d">看假名，選出正確的讀音</span></span></button>
      <button class="mode-btn" data-mode="listen"><span class="ic">👂</span><span><span class="t">聽音選字</span><br><span class="d">聽發音，選出正確的假名</span></span></button>
      <button class="mode-btn" data-mode="word"><span class="ic">🖼️</span><span><span class="t">看圖選字</span><br><span class="d">看圖片和單字，填上缺少的假名</span></span></button>
      <button class="mode-btn" data-mode="weak"><span class="ic">🔥</span><span><span class="t">弱點複習</span><br><span class="d">混合題型，專攻你答錯過、還不熟的音</span></span></button>
    </div>
    <div id="quizArea" class="hidden">
      <div class="quiz-head">
        <button class="icon-btn" id="quizQuit">✕ 結束</button>
        <span class="n" id="quizProgress"></span>
      </div>
      <div class="q-card" id="qCard"></div>
      <div class="ans-grid" id="ansGrid"></div>
      <div class="feedback" id="qFeedback"></div>
      <button class="next-btn hidden" id="qNext">下一題</button>
    </div>
    <div id="quizResult" class="hidden">
      <div class="result-card">
        <div>本回合成績</div>
        <div class="score" id="resScore"></div>
        <div id="resWrongWrap"><div style="color:var(--sub);font-size:14px">答錯的音</div><div class="wrong-list kana-font" id="resWrong"></div></div>
      </div>
      <button class="next-btn" id="resAgain">再玩一回合</button>
      <button class="nav-btn" style="width:100%;margin-top:10px" id="resBack">回測驗選單</button>
    </div>
  </section>

  <!-- 遊戲 -->
  <section id="view-game" class="hidden">
    <p class="section-note">配對翻牌：把假名和它的讀音配成一對。</p>
    <div class="game-info"><span id="gameMoves">翻牌 0 次</span><button class="icon-btn" id="gameRestart">🔄 重新開始</button></div>
    <div class="game-grid" id="gameGrid"></div>
    <div class="game-done hidden" id="gameDone"></div>
  </section>

  <!-- 進度 -->
  <section id="view-progress" class="hidden">
    <div class="stat-row">
      <div class="stat-box"><div class="v" id="stGood">0</div><div class="l">已熟練</div></div>
      <div class="stat-box"><div class="v" id="stMid">0</div><div class="l">學習中</div></div>
      <div class="stat-box"><div class="v" id="stWeak">0</div><div class="l">不熟</div></div>
      <div class="stat-box"><div class="v" id="stNew">0</div><div class="l">未測驗</div></div>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:var(--good)"></span>熟練（連對 3 次）</span>
      <span><span class="dot" style="background:var(--mid)"></span>學習中</span>
      <span><span class="dot" style="background:var(--weak)"></span>不熟</span>
      <span><span class="dot" style="background:var(--new)"></span>未測驗</span>
    </div>
    <div class="kana-grid" id="progGrid"></div>
    <button class="danger-btn" id="resetBtn">清除所有學習紀錄</button>
  </section>
</div>

<!-- 字卡全螢幕 -->
<div id="cardOverlay" class="hidden">
  <div class="inner">
    <div class="card-top">
      <button class="icon-btn" id="cardClose">✕ 關閉</button>
      <span class="pos" id="cardPos"></span>
    </div>
    <div class="flashcard">
      <div class="big-kana kana-font" id="cKana"></div>
      <div class="romaji" id="cRomaji"></div>
      <div><span class="src-chip" id="cSrc"></span></div>
      <div class="word-block">
        <div class="emoji" id="cEmoji"></div>
        <div class="word kana-font" id="cWord"></div>
        <div class="mean" id="cMean"></div>
        <div class="sub-words" id="cSubs"></div>
      </div>
      <div class="tip-box" id="cTip"></div>
      <div class="speak-row">
        <button class="speak-btn" id="speakKana">🔊 唸假名</button>
        <button class="speak-btn alt" id="speakWord">🔊 唸單字</button>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="cardPrev">← 上一個</button>
      <button class="nav-btn" id="cardNext">下一個 →</button>
    </div>
  </div>
</div>

<nav class="tabbar"><div class="wrap">
  <button class="tab-btn active" data-tab="cards"><span class="ic">🎴</span>字卡</button>
  <button class="tab-btn" data-tab="quiz"><span class="ic">✍️</span>測驗</button>
  <button class="tab-btn" data-tab="game"><span class="ic">🎮</span>遊戲</button>
  <button class="tab-btn" data-tab="progress"><span class="ic">📊</span>進度</button>
</div></nav>

<script>
"use strict";
/* ================= 資料 ================= */
const DATA = [
 {k:"あ",r:"a",src:"安",w:"あめ",wi:0,m:"雨",e:"☔",tipS:"「阿（a）嬤」下雨天撐傘。",tipI:"像一個人張開手腳在跳舞，大喊「啊（a）！」",sub:[{w:"あさ",wi:0,m:"早晨",e:"🌅"},{w:"あし",wi:0,m:"腳",e:"🦶"}]},
 {k:"い",r:"i",src:"以",w:"いぬ",wi:0,m:"狗",e:"🐶",tipS:"小狗「咿（i）～咿～」叫。",tipI:"像兩個「1」並排站好，唸「一（i）」。",sub:[{w:"いえ",wi:0,m:"家",e:"🏠"},{w:"いす",wi:0,m:"椅子",e:"🪑"}]},
 {k:"う",r:"u",src:"宇",w:"うみ",wi:0,m:"海",e:"🌊",tipS:"海上「烏（u）」雲密布。",tipI:"像一個人彎著腰，痛得「嗚（u）」一聲。",sub:[{w:"うた",wi:0,m:"歌",e:"🎵"},{w:"うし",wi:0,m:"牛",e:"🐮"}]},
 {k:"え",r:"e",src:"衣",w:"えき",wi:0,m:"車站",e:"🚉",tipS:"「ㄟ（e）！車站到了！」",tipI:"像一隻昂首伸長脖子的「鵝（e）」。",sub:[{w:"えほん",wi:0,m:"繪本",e:"📕"},{w:"えび",wi:0,m:"蝦子",e:"🦐"}]},
 {k:"お",r:"o",src:"於",w:"おにぎり",wi:0,m:"飯糰",e:"🍙",tipS:"「喔（o）！飯糰掉了！」",tipI:"像驚訝張大嘴喊「喔（o）」的人，右上那一點是噴出的口水。",sub:[{w:"おちゃ",wi:0,m:"茶",e:"🍵"},{w:"おかね",wi:0,m:"錢",e:"💰"}]},
 {k:"か",r:"ka",src:"加",w:"かさ",wi:0,m:"雨傘",e:"🌂",tipS:"讀音就是中文的「加」（ka）！",tipI:"像鐮刀「喀（ka）」地揮下，旁邊飛出一片碎葉。",sub:[{w:"かみ",wi:0,m:"紙",e:"📄"},{w:"かお",wi:0,m:"臉",e:"😊"}]},

/* ================= 學習紀錄 ================= */
const STORE_KEY = "kana50v1";
let stats = {};
try{ stats = JSON.parse(localStorage.getItem(STORE_KEY) || "{}") }catch(e){ stats = {} }
function saveStats(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(stats)) }catch(e){} }
function getStat(k){ return stats[k] || {c:0,w:0,s:0} }
function record(k, ok){
  const st = getStat(k);
  if(ok){ st.c++; st.s++; } else { st.w++; st.s=0; }
  stats[k] = st; saveStats();
}
function mastery(k){
  const st = getStat(k);
  if(st.c+st.w === 0) return "new";
  if(st.s >= 3) return "good";
  if(st.w > st.c) return "weak";
  return "mid";
}

/* ================= 發音 ================= */
let jaVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  jaVoice = vs.find(v=>v.lang.startsWith("ja")) || null;
}
if("speechSynthesis" in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ja-JP";
  if(jaVoice) u.voice = jaVoice;
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

/* ================= 共用 ================= */
function shuffle(a){
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function el(id){ return document.getElementById(id) }
function wordHTML(d, cls){
  return d.w.split("").map((ch,i)=> i===d.wi ? `<span class="${cls}">${ch}</span>` : ch).join("");
}

/* ================= 字卡 ================= */
function renderKanaGrid(container, onTap){
  container.innerHTML = "";
  ROWS.forEach(row=>{
    row.forEach(k=>{
      const cell = document.createElement("button");
      cell.className = "kana-cell";
      if(k===null){ cell.classList.add("grid-gap"); cell.tabIndex=-1; }
      else{
        cell.classList.add("m"+"-"+mastery(k));
        const d = DATA[IDX[k]];
        cell.innerHTML = `<div class="k kana-font">${k}</div><div class="r">${d.r}</div>`;
        cell.addEventListener("click", ()=>onTap(IDX[k]));
      }
      container.appendChild(cell);
    });
  });
}

const RANGE_ROWS = [
 {n:"あ行",ks:["あ","い","う","え","お"]},
 {n:"か行",ks:["か","き","く","け","こ"]},
 {n:"さ行",ks:["さ","し","す","せ","そ"]},
 {n:"た行",ks:["た","ち","つ","て","と"]},
 {n:"な行",ks:["な","に","ぬ","ね","の"]},
 {n:"は行",ks:["は","ひ","ふ","へ","ほ"]},
 {n:"ま行",ks:["ま","み","む","め","も"]},
 {n:"や行",ks:["や","ゆ","よ"]},
 {n:"ら行",ks:["ら","り","る","れ","ろ"]},
 {n:"わ・を・ん",ks:["わ","を","ん"]}
];
let rangeSel = [];
try{ rangeSel = JSON.parse(localStorage.getItem("kana50range") || "[]") }catch(e){ rangeSel = [] }
function rangeKanas(){
  if(!rangeSel.length) return DATA.map(d=>d.k);
  const out = [];
  RANGE_ROWS.forEach(r=>{ if(rangeSel.includes(r.n)) out.push(...r.ks) });
  return out.length ? out : DATA.map(d=>d.k);
}
function saveRange(){
  try{ localStorage.setItem("kana50range", JSON.stringify(rangeSel)) }catch(e){}
  gameStarted = false;
  renderRange();
}
function renderRange(){
  const box = el("rangeChips"); box.innerHTML = "";
  const all = document.createElement("button");
  all.className = "range-chip" + (rangeSel.length ? "" : " on");
  all.textContent = "全部";
  all.addEventListener("click", ()=>{ rangeSel = []; saveRange(); });
  box.appendChild(all);
  RANGE_ROWS.forEach(r=>{
    const b = document.createElement("button");
    b.className = "range-chip" + (rangeSel.includes(r.n) ? " on" : "");
    b.textContent = r.n;
    b.addEventListener("click", ()=>{
      if(rangeSel.includes(r.n)) rangeSel = rangeSel.filter(x=>x!==r.n);
      else rangeSel.push(r.n);
      saveRange();
    });
    box.appendChild(b);
  });
  el("rangeCount").textContent = "目前 " + rangeKanas().length + " 個音";
}
renderRange();

}
function pickTargets(mode, n){
  let pool = rangeKanas();
  if(mode==="weak"){
    const weakPool = pool.filter(k=>{ const m=mastery(k); return m==="weak"||m==="mid" });
    if(weakPool.length >= 4) pool = weakPool;
  }
  const picked = [];
  const avail = pool.slice();
  while(picked.length < n && avail.length){
    let total = 0;
    const ws = avail.map(k=>{ total += weightOf(k); return total });
    const r = Math.random()*total;
    let idx = ws.findIndex(w=>r<w);
    if(idx<0) idx = avail.length-1;
    picked.push(avail.splice(idx,1)[0]);
    if(!avail.length && picked.length<n) avail.push(...pool);
  }
  return picked;
}
function distractors(k, n){
  const set = new Set();
  CONFUSE.forEach(g=>{ if(g.includes(k)) g.forEach(x=>{ if(x!==k) set.add(x) }) });
  const cands = shuffle([...set]);
  const rest = shuffle(DATA.map(d=>d.k).filter(x=>x!==k && !set.has(x)));
  return cands.concat(rest).slice(0,n);
}
document.querySelectorAll(".mode-btn").forEach(b=>{
  b.addEventListener("click", ()=>startQuiz(b.dataset.mode));
});
function startQuiz(mode){
  const targets = pickTargets(mode, QUIZ_LEN);
  quiz = {mode, targets, i:0, score:0, wrong:[], answered:false};
  el("quizMenu").classList.add("hidden");
  el("quizResult").classList.add("hidden");
  el("quizArea").classList.remove("hidden");
  showQuestion();
}
function showQuestion(){
  const k = quiz.targets[quiz.i];
  const d = DATA[IDX[k]];
  quiz.answered = false;
  const qtype = quiz.mode==="weak" ? ["read","listen","word"][Math.floor(Math.random()*3)] : quiz.mode;
  quiz.qtype = qtype;
  el("quizProgress").textContent = (quiz.i+1) + " / " + QUIZ_LEN;
  el("qFeedback").textContent = ""; el("qFeedback").className = "feedback";
  el("qNext").classList.add("hidden");
  const qc = el("qCard"), ag = el("ansGrid");
  ag.innerHTML = "";
  let choices, field;
  if(qtype==="read"){
    qc.innerHTML = `<div class="q-label">這個假名怎麼唸？</div><div class="q-kana kana-font">${d.k}</div>`;
    field = "r";
  }else if(qtype==="listen"){
    qc.innerHTML = `<div class="q-label">聽發音，選出正確的假名</div><button class="play-big" id="qPlay">🔊 播放</button>`;
    field = "k";
    setTimeout(()=>speak(d.k), 250);
    qc.querySelector("#qPlay").addEventListener("click", ()=>speak(d.k));
  }else{
    const blanked = d.w.split("").map((ch,i)=> i===d.wi ? '<span class="blank">◯</span>' : ch).join("");
    qc.innerHTML = `<div class="q-label">◯ 是哪個假名？</div><div class="q-emoji">${d.e}</div><div class="q-word kana-font">${blanked}</div><div class="q-mean">${d.m}</div>`;
    field = "k";
  }
  const opts = shuffle([k, ...distractors(k,3)]);
  opts.forEach(ok=>{
    const od = DATA[IDX[ok]];
    const btn = document.createElement("button");
    btn.className = "ans-btn" + (field==="r" ? " romaji-ans" : " kana-font");
    btn.textContent = field==="r" ? od.r : od.k;
    btn.addEventListener("click", ()=>answer(btn, ok===k, k, ag));
    el("ansGrid").appendChild(btn);
  });
}
function answer(btn, ok, k, grid){
  if(quiz.answered) return;
  quiz.answered = true;
  record(k, ok);
  const d = DATA[IDX[k]];
  const correctText = quiz.qtype==="read" ? d.r : d.k;
  grid.querySelectorAll(".ans-btn").forEach(b=>{
    if(b.textContent===correctText) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  const fb = el("qFeedback");
  if(ok){ quiz.score++; fb.textContent = "答對了！"; fb.classList.add("ok"); }
  else{
    quiz.wrong.push(k);
    fb.textContent = `是「${d.k}」（${d.r}）— ${wordText(d)}`;
    fb.classList.add("no");
  }
  speak(d.k + "、" + d.w);
  el("qNext").textContent = quiz.i+1 >= QUIZ_LEN ? "看成績" : "下一題";
  el("qNext").classList.remove("hidden");
}
function wordText(d){ return d.w + "（" + d.m + "）" }
el("qNext").addEventListener("click", ()=>{
  quiz.i++;
  if(quiz.i >= QUIZ_LEN) showResult(); else showQuestion();
});
el("quizQuit").addEventListener("click", ()=>{
  el("quizArea").classList.add("hidden");
  el("quizMenu").classList.remove("hidden");
});
function showResult(){
  el("quizArea").classList.add("hidden");
  el("quizResult").classList.remove("hidden");
  el("resScore").textContent = quiz.score + " / " + QUIZ_LEN;
  const uniq = [...new Set(quiz.wrong)];
  el("resWrongWrap").style.display = uniq.length ? "" : "none";
  el("resWrong").textContent = uniq.join(" ");
}
el("resAgain").addEventListener("click", ()=>startQuiz(quiz.mode));
el("resBack").addEventListener("click", ()=>{
  el("quizResult").classList.add("hidden");
  el("quizMenu").classList.remove("hidden");
});

/* ================= 配對翻牌 ================= */
let gameStarted = false, gOpen = [], gMoves = 0, gMatched = 0, gLock = false;
function startGame(){
  gameStarted = true; gOpen = []; gMoves = 0; gMatched = 0; gLock = false;
  el("gameMoves").textContent = "翻牌 0 次";
  el("gameDone").classList.add("hidden");
  let picks = shuffle(rangeKanas().slice()).slice(0,8);
  if(picks.length < 8){
    const extra = shuffle(DATA.map(d=>d.k).filter(k=>!picks.includes(k))).slice(0, 8-picks.length);
    picks = picks.concat(extra);
  }
  const cards = [];
  picks.forEach(k=>{
    const d = DATA[IDX[k]];
    cards.push({pair:k, text:d.k, kana:true});
    cards.push({pair:k, text:d.r, kana:false});
  });
  shuffle(cards);
  const g = el("gameGrid"); g.innerHTML = "";
  cards.forEach(c=>{
    const btn = document.createElement("button");
    btn.className = "g-card" + (c.kana ? " kana-font" : "");
    btn.dataset.pair = c.pair;
    btn.dataset.text = c.text;
    btn.addEventListener("click", ()=>flip(btn));
    g.appendChild(btn);
  });
}
function flip(btn){
  if(gLock || btn.classList.contains("open") || btn.classList.contains("matched")) return;
  btn.classList.add("open");
  btn.textContent = btn.dataset.text;
  gOpen.push(btn);
  if(gOpen.length===2){
    gMoves++;
    el("gameMoves").textContent = "翻牌 " + gMoves + " 次";
    const [a,b] = gOpen;
    if(a.dataset.pair === b.dataset.pair){
      a.classList.add("matched"); b.classList.add("matched");
      a.classList.remove("open"); b.classList.remove("open");
      speak(a.dataset.pair);
      gOpen = []; gMatched++;
      if(gMatched===8){
        const done = el("gameDone");
        done.textContent = "🎉 全部配對完成！共翻了 " + gMoves + " 次";
        done.classList.remove("hidden");
      }
    }else{
      gLock = true;
      setTimeout(()=>{
        a.classList.remove("open"); b.classList.remove("open");
        a.textContent = ""; b.textContent = "";
        gOpen = []; gLock = false;
      }, 750);
    }
  }
}
el("gameRestart").addEventListener("click", startGame);

/* ================= 進度 ================= */
function renderProgress(){
  const counts = {good:0, mid:0, weak:0, new:0};
  DATA.forEach(d=>counts[mastery(d.k)]++);
  el("stGood").textContent = counts.good;
  el("stMid").textContent = counts.mid;
  el("stWeak").textContent = counts.weak;
  el("stNew").textContent = counts.new;
  renderKanaGrid(el("progGrid"), openCard);
}
el("resetBtn").addEventListener("click", ()=>{
  if(confirm("確定要清除所有學習紀錄嗎？")){
    stats = {}; saveStats(); renderProgress();
  }
});
